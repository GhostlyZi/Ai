
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { background-color: #0d0d0d; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        .alert-box { 
            border: 3px solid #ff0000; 
            padding: 15px; 
            border-radius: 10px; 
            background: #1a0000;
            max-width: 400px;
            margin: auto;
        }
        .suspect-img { 
            width: 100%; 
            border: 2px solid #ff0000; 
            margin-bottom: 10px; 
        }
        .text-red { color: #ff0000; font-weight: bold; }
        .data-label { color: #aaa; }
    </style>
</head>
<body>

    <div class="alert-box">
        <h2 style="text-align: center;">LIVE ALERT 🔴</h2>
        
        <img src="https://via.placeholder.com/300" class="suspect-img" alt="Suspect">
        
        <p><span class="data-label">Identity:</span> Unknown</p>
        <p><span class="data-label">Risk Level:</span> <span class="text-red">High</span></p>
        <p><span class="data-label">Behavior:</span> <span class="text-red">Suspicious</span></p>
        
        <button style="width: 100%; background: #ff0000; color: white; border: none; padding: 10px;">
            تنبيه القوات الأمنية
        </button>
    </div>

</body>
</html>
